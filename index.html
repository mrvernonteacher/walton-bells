<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walton Bell Schedule</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        /* --- Dark Mode Variables --- */
        body.dark-mode { background-color: #121212; color: #e0e0e0; }
        body.dark-mode .schedule-container, body.dark-mode .sidebar, body.dark-mode #clock { background: #1e1e1e; color: #e0e0e0; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        body.dark-mode h1, body.dark-mode h3, body.dark-mode .schedule-header, body.dark-mode .period-name, body.dark-mode .title { color: #90caf9; border-color: #444; }
        body.dark-mode #schedule-list li { border-color: #333; }
        body.dark-mode #schedule-list li:nth-child(even) { background-color: #2a2a2a; }
        body.dark-mode select, body.dark-mode input[type="text"], body.dark-mode input[type="time"] { background: #333; color: #fff; border-color: #555; }
        body.dark-mode .icon-btn, body.dark-mode .waffle-btn-global { color: #90caf9; }
        body.dark-mode .icon-btn:hover, body.dark-mode .waffle-btn-global:hover { background-color: #333; }
        body.dark-mode .period-time { color: #aaa; }
        body.dark-mode .dropdown-content { background-color: #333; border-color: #555; }
        body.dark-mode .dropdown-content button { color: #e0e0e0; border-color: #444; }
        body.dark-mode .dropdown-content button:hover { background-color: #444; color: #90caf9; }

        /* --- Compact Header Layout --- */
        .top-bar {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .header-logo { max-width: 180px; height: auto; display: block; margin: 0 auto; }
        
        .center-title-clock { text-align: center; flex-grow: 1; }
        .center-title-clock h1 { font-size: 1.5rem; margin-bottom: 0; color: #003366; transition: color 0.3s ease; }
        body.dark-mode .center-title-clock h1 { color: #90caf9; }

        #clock {
            font-size: 4.5rem;
            font-weight: bold;
            padding: 10px 30px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: #003366;
            display: inline-block;
            margin-top: 5px;
            transition: all 0.3s ease;
        }

        .action-buttons-left, .action-buttons-right {
            display: flex;
            gap: 10px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        .action-buttons-left { left: 0; }
        .action-buttons-right { right: 0; }

        .icon-btn {
            background: none; border: none; font-size: 2rem; color: #003366; cursor: pointer;
            padding: 8px; border-radius: 8px; transition: background-color 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { background-color: #e2e2ec; }

        .dashboard-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
            align-items: flex-start;
        }

        /* --- Sidebar --- */
        .sidebar {
            flex: 1; min-width: 320px; max-width: 350px; background: #fff; padding: 20px;
            border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 1; overflow: hidden; transform-origin: left center;
        }
        .sidebar.collapsed { min-width: 0; max-width: 0; padding: 0; margin-left: -20px; opacity: 0; transform: scaleX(0); border: none; }

        .main-content { flex: 2; min-width: 500px; display: flex; flex-direction: column; transition: all 0.4s ease; }

        .schedule-container {
            background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box;
        }
        .schedule-header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .schedule-header-wrap h3 { margin: 0; font-size: 1.3rem; color: #003366; transition: color 0.3s ease; }

        .waffle-btn-global {
            background: none; border: none; color: #003366; cursor: pointer; padding: 5px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; transition: background-color 0.2s, color 0.2s;
        }
        .waffle-btn-global:hover { background-color: #e2e2ec; }

        /* UI Controls */
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px;}
        .control-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0;}
        .control-group label.title { font-weight: bold; display: block; margin-bottom: 8px; color: #003366; transition: color 0.3s ease; }
        select, input[type="time"], input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 0.95rem; }
        .volume-container { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        input[type="range"] { flex-grow: 1; cursor: pointer; }

        .split-button-container { display: flex; align-items: stretch; width: 100%; margin-top: 10px; }
        .split-button-main { flex-grow: 1; background-color: #5bc0de; color: white; border: none; padding: 10px 15px; border-radius: 5px 0 0 5px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: background-color 0.2s; text-align: left; }
        .split-button-main:hover { background-color: #31b0d5; }
        .dropdown { position: relative; display: flex; }
        .split-button-caret { background-color: #46b8da; color: white; border: none; border-left: 1px solid #31b0d5; padding: 0 12px; border-radius: 0 5px 5px 0; cursor: pointer; font-size: 1rem; transition: background-color 0.2s; }
        .split-button-caret:hover { background-color: #31b0d5; }
        .dropdown-content { display: none; position: absolute; right: 0; top: 100%; background-color: #fff; min-width: 240px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 10; border-radius: 5px; overflow: hidden; border: 1px solid #ddd; }
        .dropdown-content.show { display: block; }
        .dropdown-content button { color: #333; padding: 10px 15px; text-decoration: none; display: block; width: 100%; background: none; border: none; border-bottom: 1px solid #eee; text-align: left; margin: 0; font-size: 0.95rem; }
        .dropdown-content button:hover { background-color: #f1f1f1; color: #003366; }

        .btn { background-color: #003366; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 10px; font-weight: bold; transition: background-color 0.2s; }
        .btn:hover { background-color: #002244; }
        .btn-danger { background-color: #d9534f; }
        .btn-danger:hover { background-color: #c9302c; }
        .btn-success { background-color: #5cb85c; }
        .btn-success:hover { background-color: #4cae4c; }

        /* Custom Toggles */
        .switch-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #003366; }
        input:checked + .slider:before { transform: translateX(20px); }
        body.dark-mode input:checked + .slider { background-color: #90caf9; }

        /* Schedule Grid */
        .schedule-grid {
            display: grid;
            grid-template-columns: 80px repeat(6, 1fr) 110px;
            gap: 8px; align-items: center; text-align: center; transition: all 0.3s ease;
        }
        
        .schedule-header { font-size: 0.8rem; font-weight: bold; color: #003366; border-bottom: 2px solid #ccc; padding-bottom: 8px; margin-bottom: 8px; transition: color 0.3s ease; }
        #schedule-list { list-style-type: none; padding: 0; margin: 0; }
        #schedule-list li { padding: 10px 5px; border-bottom: 1px solid #eee; transition: all 0.2s ease; }
        #schedule-list li:nth-child(even) { background-color: #f9f9fc; }
        #schedule-list input[type="checkbox"] { cursor: pointer; transform: scale(1.3); margin: 0; }

        .period-name { font-weight: bold; text-align: left; font-size: 1.1rem; transition: all 0.3s ease;}
        .period-time { text-align: right; font-size: 1rem; color: #555; transition: all 0.3s ease;}

        /* Student View */
        .student-view .options-col { display: none; }
        .student-view .schedule-grid { grid-template-columns: 1fr 1fr; padding: 5px 20px; }
        .student-view .period-name { font-size: 2.2rem; color: #003366; }
        body.dark-mode .student-view .period-name { color: #90caf9; }
        .student-view .period-time { font-size: 2rem; font-weight: bold; color: #333; }
        body.dark-mode .student-view .period-time { color: #e0e0e0; }
        .student-view .schedule-header { display: none; } 

        .footer { margin-top: 40px; padding-top: 20px; font-size: 1rem; color: #555; text-align: center; width: 100%; }
        .footer-logo { max-width: 250px; height: auto; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="action-buttons-left">
            <button id="hamburgerBtn" class="icon-btn" onclick="toggleSidebar()" title="Toggle Settings">☰</button>
        </div>
        
        <div class="center-title-clock">
            <img src="https://drive.google.com/thumbnail?id=1XJEeGiblu9O3iGevy_j8RLR06LcyimqQ&sz=w400" alt="Walton Logo" class="header-logo">
            <div id="clock">00:00:00 AM</div>
        </div>

        <div class="action-buttons-right">
            <button class="icon-btn" onclick="toggleFullScreen()" title="Full Screen">⛶</button>
        </div>
    </div>

    <div class="dashboard-wrapper">
        <div class="sidebar" id="sidebar">
            
            <div class="control-group">
                <div class="switch-container">
                    <span style="font-weight: bold; color: #555;" id="darkModeLabel">Dark Mode</span>
                    <label class="switch">
                        <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="control-group">
                <label class="title">1. Audio Settings</label>
                
                <label style="font-size: 0.85rem; color: #777; margin-bottom: 5px; display: block;">Dynamic Voice Selection:</label>
                <select id="voicePreference" onchange="changeVoicePref()" style="margin-bottom: 10px;">
                    <option value="">Loading voices...</option>
                </select>

                <div class="volume-container">
                    <span>🔈</span>
                    <input type="range" id="volumeControl" min="0" max="1" step="0.05" value="1" onchange="changeVolume()">
                    <span>🔊</span>
                </div>

                <div class="split-button-container">
                    <button id="playBtn" class="split-button-main" onclick="testSelectedSound()">▶ Play Class Start</button>
                    <div class="dropdown">
                        <button class="split-button-caret" onclick="toggleDropdown(event)">▼</button>
                        <div id="soundDropdown" class="dropdown-content">
                            <button onclick="selectTestSound('start', 'Class Start')">Class Start (3 Rings & Caddy)</button>
                            <button onclick="selectTestSound('end', 'Class End')">Class End (3 Rings)</button>
                            <button onclick="selectTestSound('warning1m', '1-Min Warning')">1-Min Warning (1 Ring)</button>
                            <button onclick="selectTestSound('attendance', 'Take Attendance')">Take Attendance Voice</button>
                            <button onclick="selectTestSound('cleanup', '5-Min Clean-Up')">5-Min Clean-Up Voice</button>
                            <button onclick="selectTestSound('retrieve', 'Phone Retrieve')">Phone Retrieve Voice</button>
                            <button onclick="selectTestSound('lunch', 'Lunch Duty')">Lunch Duty Voice</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label class="title" for="scheduleMode">2. Select Schedule Mode:</label>
                <select id="scheduleMode" onchange="changeMode()" style="margin-bottom: 10px;">
                    <option value="regular">Regular Bell Schedule</option>
                    <option value="web">WEB Bell Schedule</option>
                    <option value="custom">Custom Bell Schedule</option>
                </select>
                
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; color: #555;">
                    <input type="checkbox" id="showZeroPeriod" onchange="changeMode()"> Show 0 Period
                </label>
            </div>

            <div class="control-group" id="custom-builder">
                <label class="title">Custom Builder:</label>
                <input type="text" id="customName" placeholder="Period Name (e.g., 1st Period)" style="margin-bottom:8px;">
                <div style="display:flex; gap:8px; margin-bottom:8px;">
                    <input type="time" id="customStart" required>
                    <input type="time" id="customEnd" required>
                </div>
                <button class="btn" onclick="addCustomPeriod()">Add to Schedule</button>
                <button class="btn btn-danger" onclick="clearCustomSchedule()">Clear Schedule</button>
            </div>

            <div class="control-group">
                <label class="title">3. Backup & Share</label>
                <button class="btn btn-success" onclick="exportAllSettings()">Export Config</button>
                <div class="file-input-wrapper">
                    <input type="file" id="importFile" accept=".json" onchange="importAllSettings(event)">
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="schedule-container" id="schedule-container">
                
                <div class="schedule-header-wrap">
                    <h3 id="schedule-title" style="display: flex; align-items: center; gap: 10px;">
                        Active Schedule <span id="autoIndicator" style="display: none; font-size: 0.8rem; background: #5cb85c; color: white; padding: 2px 8px; border-radius: 12px; font-weight: normal;">Auto-Synced</span>
                    </h3>
                    <button id="studentViewBtn" class="waffle-btn-global" onclick="toggleStudentView()" title="Toggle Options">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                            <rect x="4" y="4" width="4" height="4" rx="1"/><rect x="10" y="4" width="4" height="4" rx="1"/><rect x="16" y="4" width="4" height="4" rx="1"/><rect x="4" y="10" width="4" height="4" rx="1"/><rect x="10" y="10" width="4" height="4" rx="1"/><rect x="16" y="10" width="4" height="4" rx="1"/><rect x="4" y="16" width="4" height="4" rx="1"/><rect x="10" y="16" width="4" height="4" rx="1"/><rect x="16" y="16" width="4" height="4" rx="1"/>
                        </svg>
                    </button>
                </div>
                
                <div class="schedule-grid schedule-header">
                    <div class="period-name">Class</div>
                    <div class="options-col">Caddy</div>
                    <div class="options-col">Attend.</div>
                    <div class="options-col">Clean</div>
                    <div class="options-col">Retrie.</div>
                    <div class="options-col">Lunch 1</div>
                    <div class="options-col">Lunch 2</div>
                    <div class="period-time">Time</div>
                </div>
                
                <ul id="schedule-list"></ul>
                <p id="disclaimer-text" style="font-size: 0.8rem; color: #888; text-align: right; margin-top: 10px;">*The 1-Minute Warning bell is always active by default.</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>Brought to you by Walton Engineering.</p>
        <img src="https://drive.google.com/thumbnail?id=1C_7ujbANbJaMShbWDxuXx0m4ZTJLtkSE&sz=w800" alt="Walton Engineering Logo" class="footer-logo">
    </div>

    <audio id="regularBellAudio" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a73467.mp3" preload="auto"></audio>

    <script>
        // --- GOOGLE APPS SCRIPT WEB APP URL ---
        // We will paste your generated URL here in Step 2!
        const GOOGLE_CALENDAR_SCRIPT_URL = ""; 

        const DEFAULT_PREFS = { putaway: false, attendance: false, cleanup: false, retrieve: false, lunch1: false, lunch2: false };

        let predefinedSchedules = {
            regular: [
                { name: "0 pd", start: "07:10", end: "08:13" }, { name: "1st", start: "08:20", end: "09:13" },
                { name: "HR", start: "09:20", end: "09:30" }, { name: "2nd", start: "09:37", end: "10:30" },
                { name: "3rd", start: "10:37", end: "11:30" }, { name: "4th", start: "11:37", end: "12:30" },
                { name: "5th", start: "12:37", end: "13:30" }, { name: "6th", start: "13:37", end: "14:30" },
                { name: "7th", start: "14:37", end: "15:30" }
            ],
            web: [
                { name: "0 pd", start: "07:10", end: "08:13" }, { name: "1st", start: "08:20", end: "08:50" },
                { name: "HR", start: "08:56", end: "09:05" }, { name: "2nd", start: "09:11", end: "09:40" },
                { name: "3rd", start: "09:46", end: "10:15" }, { name: "4th", start: "10:21", end: "10:50" },
                { name: "5th", start: "10:56", end: "11:25" }, { name: "6th", start: "11:31", end: "12:00" },
                { name: "7th", start: "12:06", end: "12:35" }, { name: "Q Block", start: "12:35", end: "12:55" },
                { name: "A Block", start: "13:00", end: "13:25" }, { name: "B Block", start: "13:30", end: "13:55" },
                { name: "C Block", start: "14:00", end: "14:25" }, { name: "D Block", start: "14:30", end: "14:55" },
                { name: "Dept Meetings", start: "15:00", end: "15:30" }
            ],
            custom: []
        };

        let currentMode = 'regular', activeSchedule = predefinedSchedules.regular, lastPlayedAction = null;
        let globalVolume = 1.0, globalVoicePref = '', classSettings = {};
        let currentTestSound = 'start', sidebarVisible = true, isStudentView = false, isDarkMode = false, showZero = false;

        // --- Dynamic Voice Population ---
        function populateVoiceList() {
            const voiceSelect = document.getElementById("voicePreference");
            const voices = window.speechSynthesis.getVoices();
            if(voices.length === 0) return;
            
            const selectedURI = globalVoicePref;
            voiceSelect.innerHTML = '';
            
            // Only grab English voices to keep the list clean
            const enVoices = voices.filter(v => v.lang.startsWith('en'));
            
            enVoices.forEach(voice => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.voiceURI;
                if(voice.voiceURI === selectedURI) option.selected = true;
                voiceSelect.appendChild(option);
            });
            
            if(!voiceSelect.value && enVoices.length > 0) {
                voiceSelect.value = enVoices[0].voiceURI;
            }
            globalVoicePref = voiceSelect.value;
        }
        window.speechSynthesis.onvoiceschanged = populateVoiceList;

        // --- Google Calendar Auto-Fetch ---
        async function fetchDailySchedule() {
            if (!GOOGLE_CALENDAR_SCRIPT_URL) return;
            try {
                const response = await fetch(GOOGLE_CALENDAR_SCRIPT_URL);
                const data = await response.json();
                if (data && data.mode) {
                    document.getElementById('scheduleMode').value = data.mode;
                    document.getElementById('autoIndicator').style.display = 'inline-block';
                    changeMode(); // Apply the change
                }
            } catch (err) { console.error("Could not sync with Google Calendar", err); }
        }

        // --- Core App Logic ---
        function saveLocalSettings() {
            try {
                const data = {
                    mode: currentMode, vol: globalVolume, voice: globalVoicePref, testSound: currentTestSound,
                    side: sidebarVisible, student: isStudentView, dark: isDarkMode, zero: showZero,
                    customSchedule: predefinedSchedules.custom, settings: classSettings
                };
                localStorage.setItem('waltonBellState', JSON.stringify(data));
            } catch (e) {}
        }

        function loadLocalSettings() {
            try {
                const saved = localStorage.getItem('waltonBellState');
                if (saved) {
                    const p = JSON.parse(saved);
                    if (p.customSchedule) predefinedSchedules.custom = p.customSchedule;
                    if (p.settings) classSettings = p.settings;
                    
                    currentMode = p.mode || 'regular';
                    document.getElementById('scheduleMode').value = currentMode;
                    
                    globalVoicePref = p.voice || '';
                    
                    if (p.vol !== undefined) {
                        globalVolume = p.vol;
                        document.getElementById('volumeControl').value = globalVolume;
                        document.getElementById('regularBellAudio').volume = globalVolume;
                    }
                    
                    if (p.testSound) {
                        currentTestSound = p.testSound;
                        const labels = {
                            'start': 'Class Start', 'end': 'Class End', 'warning1m': '1-Min Warning',
                            'attendance': 'Take Attendance', 'cleanup': '5-Min Clean-Up', 'retrieve': 'Phone Retrieve', 'lunch': 'Lunch Duty'
                        };
                        if (labels[currentTestSound]) document.getElementById("playBtn").innerHTML = "▶ Play " + labels[currentTestSound];
                    }

                    if (p.side === false) toggleSidebar(false); 
                    if (p.student === true) toggleStudentView(false);
                    if (p.dark === true) { document.getElementById('darkModeToggle').checked = true; toggleDarkMode(false); }
                    if (p.zero === true) { document.getElementById('showZeroPeriod').checked = true; showZero = true; }
                }
            } catch (e) {}
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => {});
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function toggleDarkMode(shouldSave = true) {
            isDarkMode = document.getElementById('darkModeToggle').checked;
            if (isDarkMode) { document.body.classList.add('dark-mode'); document.getElementById('darkModeLabel').style.color = '#90caf9'; } 
            else { document.body.classList.remove('dark-mode'); document.getElementById('darkModeLabel').style.color = '#555'; }
            if (shouldSave) saveLocalSettings();
        }

        function toggleSidebar(shouldSave = true) {
            const sidebar = document.getElementById('sidebar');
            if (shouldSave) sidebarVisible = !sidebarVisible;
            if (sidebarVisible) sidebar.classList.remove('collapsed');
            else sidebar.classList.add('collapsed');
            if (shouldSave) saveLocalSettings();
        }

        function toggleStudentView(shouldSave = true) {
            const container = document.getElementById('schedule-container');
            const disclaimer = document.getElementById('disclaimer-text');
            const btn = document.getElementById('studentViewBtn');
            if (shouldSave) isStudentView = !isStudentView;
            
            if (isStudentView) {
                container.classList.add('student-view'); disclaimer.style.display = 'none'; btn.style.color = '#888';
            } else {
                container.classList.remove('student-view'); disclaimer.style.display = 'block'; btn.style.color = isDarkMode ? '#90caf9' : '#003366'; 
            }
            if (shouldSave) saveLocalSettings();
        }

        function toggleDropdown(event) { event.stopPropagation(); document.getElementById("soundDropdown").classList.toggle("show"); }

        window.onclick = function(event) {
            if (!event.target.matches('.split-button-caret')) {
                let dropdowns = document.getElementsByClassName("dropdown-content");
                for (let i = 0; i < dropdowns.length; i++) if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
            }
        }

        function selectTestSound(value, label) {
            currentTestSound = value; document.getElementById("playBtn").innerHTML = "▶ Play " + label;
            document.getElementById("soundDropdown").classList.remove("show"); saveLocalSettings();
        }

        function changeVolume() { globalVolume = document.getElementById('volumeControl').value; document.getElementById('regularBellAudio').volume = globalVolume; saveLocalSettings(); }
        function changeVoicePref() { globalVoicePref = document.getElementById('voicePreference').value; saveLocalSettings(); }

        function playBellWithQueue(timesLeft = 1, onCompleteCallback = null) {
            const audio = document.getElementById('regularBellAudio'); audio.currentTime = 0;
            audio.onended = () => { if (timesLeft > 1) playBellWithQueue(timesLeft - 1, onCompleteCallback); else { audio.onended = null; if (onCompleteCallback) onCompleteCallback(); } };
            audio.play().catch(e => console.log("Audio play failed.", e));
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9; utterance.volume = globalVolume;
            const voices = window.speechSynthesis.getVoices();
            
            // Find the exact voice URI the user selected
            const selectedVoice = voices.find(v => v.voiceURI === globalVoicePref);
            if (selectedVoice) utterance.voice = selectedVoice;
            
            window.speechSynthesis.speak(utterance);
        }

        function testSelectedSound() {
            triggerVisualAlert();
            if (currentTestSound === 'start') playBellWithQueue(3, () => speak("Class is beginning. Please place your phones in the cell phone caddy."));
            else if (currentTestSound === 'end') playBellWithQueue(3);
            else if (currentTestSound === 'warning1m') playBellWithQueue(1, () => speak("One minute until class begins. Please place your phones in the cell phone caddy."));
            else if (currentTestSound === 'attendance') speak("Reminder. Please take attendance.");
            else if (currentTestSound === 'cleanup') speak("Five minutes remaining. Please begin cleaning up your area.");
            else if (currentTestSound === 'retrieve') speak("One minute remaining. You may retrieve your cell phones.");
            else if (currentTestSound === 'lunch') speak("Reminder. You have lunch duty.");
        }

        function changeMode() {
            currentMode = document.getElementById('scheduleMode').value;
            showZero = document.getElementById('showZeroPeriod').checked;
            
            activeSchedule = predefinedSchedules[currentMode];
            document.getElementById('custom-builder').style.display = (currentMode === 'custom') ? 'block' : 'none';
            const titles = { 'regular': 'Regular Schedule', 'web': 'WEB Schedule', 'custom': 'Custom Schedule' };
            document.getElementById('schedule-title').childNodes[0].nodeValue = titles[currentMode] + ' '; // Update text without destroying auto indicator
            
            renderSchedule();
            saveLocalSettings();
        }

        function toggleSetting(periodName, settingType, isChecked) {
            const key = `${currentMode}-${periodName}`;
            if (!classSettings[key]) classSettings[key] = { ...DEFAULT_PREFS };
            classSettings[key][settingType] = isChecked;
            saveLocalSettings();
        }

        function renderSchedule() {
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';
            
            let filteredSchedule = activeSchedule;
            // Filter out 0 pd if toggle is off
            if (!showZero) {
                filteredSchedule = activeSchedule.filter(p => !p.name.includes("0 pd"));
            }

            if (filteredSchedule.length === 0) { list.innerHTML = '<li style="text-align:center; padding: 20px;"><em>No periods added yet.</em></li>'; return; }

            filteredSchedule.forEach(period => {
                const key = `${currentMode}-${period.name}`;
                const s = classSettings[key] || { ...DEFAULT_PREFS };
                const li = document.createElement('li');
                li.className = 'schedule-grid';
                
                li.innerHTML = `
                    <div class="period-name">${period.name}</div>
                    <div class="options-col"><input type="checkbox" onchange="toggleSetting('${period.name}', 'putaway', this.checked)" ${s.putaway ? 'checked' : ''} title="Phone Caddy"></div>
                    <div class="options-col"><input type="checkbox" onchange="toggleSetting('${period.name}', 'attendance', this.checked)" ${s.attendance ? 'checked' : ''} title="Take Attendance"></div>
                    <div class="options-col"><input type="checkbox" onchange="toggleSetting('${period.name}', 'cleanup', this.checked)" ${s.cleanup ? 'checked' : ''} title="5-Min Clean Up"></div>
                    <div class="options-col"><input type="checkbox" onchange="toggleSetting('${period.name}', 'retrieve', this.checked)" ${s.retrieve ? 'checked' : ''} title="Phone Retrieve"></div>
                    <div class="options-col"><input type="checkbox" onchange="toggleSetting('${period.name}', 'lunch1', this.checked)" ${s.lunch1 ? 'checked' : ''} title="1st Half Lunch Duty"></div>
                    <div class="options-col"><input type="checkbox" onchange="toggleSetting('${period.name}', 'lunch2', this.checked)" ${s.lunch2 ? 'checked' : ''} title="2nd Half Lunch Duty"></div>
                    <div class="period-time">${formatTime12(period.start)} - ${formatTime12(period.end)}</div>
                `;
                list.appendChild(li);
            });
        }

        function addCustomPeriod() {
            const name = document.getElementById('customName').value, start = document.getElementById('customStart').value, end = document.getElementById('customEnd').value;
            if (name && start && end) {
                predefinedSchedules.custom.push({ name, start, end }); predefinedSchedules.custom.sort((a, b) => a.start.localeCompare(b.start));
                changeMode(); document.getElementById('customName').value = ''; document.getElementById('customStart').value = ''; document.getElementById('customEnd').value = '';
            }
        }
        function clearCustomSchedule() {
            if(confirm("Are you sure you want to clear your custom schedule?")) {
                predefinedSchedules.custom = [];
                Object.keys(classSettings).forEach(key => { if (key.startsWith('custom-')) delete classSettings[key]; });
                changeMode();
            }
        }
        function exportAllSettings() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ customSchedule: predefinedSchedules.custom, settings: classSettings }));
            const a = document.createElement('a'); a.setAttribute("href", dataStr); a.setAttribute("download", "Walton_Bell_Settings.json");
            document.body.appendChild(a); a.click(); a.remove();
        }
        function importAllSettings(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const d = JSON.parse(e.target.result);
                    if (d.customSchedule !== undefined && d.settings !== undefined) {
                        predefinedSchedules.custom = d.customSchedule; classSettings = d.settings;
                        document.getElementById('scheduleMode').value = currentMode; changeMode(); alert("Settings imported successfully!");
                    } else alert("Invalid format.");
                } catch (err) { alert("Error reading file."); }
                event.target.value = ''; 
            }; reader.readAsText(file);
        }

        // Time Math Utilities
        function formatTime12(time24) { let [h, m] = time24.split(':'); let ampm = h >= 12 ? 'PM' : 'AM'; return `${h % 12 || 12}:${m} ${ampm}`; }
        function subtractMinutes(time24, minsToSubtract) {
            let [h, m] = time24.split(':').map(Number); let d = new Date(); d.setHours(h, m, 0, 0); d.setMinutes(d.getMinutes() - minsToSubtract);
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }
        function addMinutes(time24, minsToAdd) {
            let [h, m] = time24.split(':').map(Number); let d = new Date(); d.setHours(h, m, 0, 0); d.setMinutes(d.getMinutes() + minsToAdd);
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }
        function getMidpoint(start, end) {
            let [sh, sm] = start.split(':').map(Number); let [eh, em] = end.split(':').map(Number);
            let midMins = Math.floor(((sh * 60 + sm) + (eh * 60 + em)) / 2);
            return Math.floor(midMins / 60).toString().padStart(2, '0') + ':' + (midMins % 60).toString().padStart(2, '0');
        }

        function triggerVisualAlert() {
            document.body.style.backgroundColor = isDarkMode ? '#332b00' : '#fff3cd'; 
            setTimeout(() => { document.body.style.backgroundColor = isDarkMode ? '#121212' : '#f4f4f9'; }, 6000); 
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US');
            let current24 = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

            activeSchedule.forEach(period => {
                // If 0 period is hidden, don't trigger its alarms!
                if (!showZero && period.name.includes("0 pd")) return;

                const s = classSettings[`${currentMode}-${period.name}`] || { ...DEFAULT_PREFS };

                const startMinus1 = subtractMinutes(period.start, 1);
                const startPlus5 = addMinutes(period.start, 5);
                const endMinus5 = subtractMinutes(period.end, 5);
                const endMinus1 = subtractMinutes(period.end, 1);
                const midPoint = getMidpoint(period.start, period.end);

                if (current24 === period.start) {
                    triggerEvent(current24, `start-${period.name}`, () => {
                        triggerVisualAlert();
                        let speechText = "";
                        if (s.putaway) speechText += "Class is beginning. Please place your phones in the cell phone caddy. ";
                        if (s.lunch1) speechText += "Reminder: You have first half lunch duty.";
                        
                        if (speechText) playBellWithQueue(3, () => speak(speechText));
                        else playBellWithQueue(3);
                    });
                }
                
                if (current24 === period.end) {
                    triggerEvent(current24, `end-${period.name}`, () => { triggerVisualAlert(); playBellWithQueue(3); });
                }

                if (current24 === startMinus1) {
                    triggerEvent(current24, `warning1m-${period.name}`, () => {
                        triggerVisualAlert();
                        let speechText = "One minute until class begins.";
                        if (s.putaway) speechText += " Please place your phones in the cell phone caddy.";
                        playBellWithQueue(1, () => speak(speechText));
                    });
                }

                if (s.attendance && current24 === startPlus5) {
                    triggerEvent(current24, `attendance5m-${period.name}`, () => { triggerVisualAlert(); speak("Reminder. Please take attendance."); });
                }
                
                if (s.lunch2 && current24 === midPoint) {
                    triggerEvent(current24, `lunch2-${period.name}`, () => { triggerVisualAlert(); speak("Reminder. You have second half lunch duty."); });
                }

                if (s.cleanup && current24 === endMinus5) {
                    triggerEvent(current24, `cleanup5m-${period.name}`, () => { triggerVisualAlert(); speak("Five minutes remaining. Please begin cleaning up your area."); });
                }

                if (s.retrieve && current24 === endMinus1) {
                    triggerEvent(current24, `phone1m-${period.name}`, () => { triggerVisualAlert(); speak("One minute remaining. You may retrieve your cell phones."); });
                }
            });
        }

        function triggerEvent(time, action, callback) {
            const eventKey = `${time}-${action}`;
            if (lastPlayedAction !== eventKey) { callback(); lastPlayedAction = eventKey; }
        }

        const worker = new Worker(URL.createObjectURL(new Blob([`setInterval(() => { postMessage('tick'); }, 1000);`], { type: 'application/javascript' })));
        worker.onmessage = function() { updateClock(); };

        // INITIALIZATION
        populateVoiceList(); 
        loadLocalSettings(); 
        fetchDailySchedule(); // Ping Google Calendar
        updateClock();
    </script>
</body>
</html>
