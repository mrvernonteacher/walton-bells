<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walton Bell Schedule</title>
    <style>
        /* --- Clean Browser Resets --- */
        * { -webkit-tap-highlight-color: transparent !important; outline: none !important; }

        /* --- Sleek Auto-Hiding Scrollbars --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: transparent; border-radius: 10px; }
        body:hover ::-webkit-scrollbar-thumb, .sidebar:hover ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.25); }
        body.dark-mode:hover ::-webkit-scrollbar-thumb, body.dark-mode .sidebar:hover ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.25); }
        * { scrollbar-width: thin; scrollbar-color: transparent transparent; } 
        *:hover { scrollbar-color: rgba(150,150,150,0.5) transparent; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 100px 20px 100px 20px; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
            position: relative; 
        }

        /* --- Fullscreen YouTube Background --- */
        #vibe-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; overflow: hidden;
            opacity: 0; transition: opacity 1.5s ease; 
        }
        #vibe-bg iframe {
            width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: none;
        }

        /* --- Master Top Navigation Bar --- */
        .floating-header {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 75px;
            display: grid; grid-template-columns: 240px 1fr auto; align-items: center; 
            padding: 0 30px; box-sizing: border-box;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-radius: 0 0 15px 15px;
            z-index: 1100;
            transition: all 0.6s cubic-bezier(0.25, 1.2, 0.3, 1);
        }
        body.dark-mode .floating-header { background: rgba(30, 30, 30, 0.85); box-shadow: 0 4px 20px rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.05); }

        .header-left { display: flex; align-items: center; gap: 15px; justify-self: start; height: 75px;}
        .header-right { display: flex; align-items: center; gap: 10px; justify-self: end; height: 75px;}
        .header-center { justify-self: center; display: flex; align-items: center; justify-content: center; width: 100%; height: 75px; position: relative;}

        .header-logo { height: 38px; width: auto; opacity: 0.6; transition: opacity 0.4s ease; display: block; }
        .header-logo:hover { opacity: 1; }
        
        #clock { font-size: 2rem; font-weight: bold; color: #003366; background: transparent; text-align: right; white-space: nowrap; flex-shrink: 0; }
        body.dark-mode #clock { color: #e0e0e0; }

        /* --- QOTD FULL-WIDTH SUB-BAR --- */
        .qotd-sub-bar {
            position: fixed; top: 50px; left: 0; width: 100%; box-sizing: border-box;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-radius: 0;
            border-bottom: 1px solid rgba(150,150,150,0.2);
            display: flex; align-items: center; justify-content: center; gap: 20px;
            padding: 8px 30px; z-index: 1090; opacity: 0; pointer-events: none;
            transition: all 0.5s cubic-bezier(0.25, 1.2, 0.3, 1); white-space: nowrap;
        }
        body.dark-mode .qotd-sub-bar { background: rgba(30, 30, 30, 0.85); box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .qotd-sub-bar.visible { opacity: 1; pointer-events: auto; top: 75px; }
        .sub-qotd-text { font-size: 1.15rem; font-weight: bold; color: #003366; }
        body.dark-mode .sub-qotd-text { color: #90caf9; }
        .sub-qotd-qr { width: 45px; height: 45px; border-radius: 5px; cursor: pointer; transition: transform 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .sub-qotd-qr:hover { transform: scale(3.5) translate(-10px, 15px); z-index: 2000; }

        /* --- Sidebar & Z-Index Fix --- */
        .sidebar {
            flex: 1; min-width: 320px; max-width: 350px; padding: 15px 20px;
            border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: all 0.6s cubic-bezier(0.25, 1.2, 0.3, 1);
            opacity: 1; overflow: hidden; transform-origin: left center;
            position: relative; z-index: 2000 !important; /* Sidebar now covers EVERYTHING */
        }
        .sidebar.collapsed { min-width: 0; max-width: 0; padding: 0; opacity: 0; transform: scaleX(0); }

        /* --- Widgets & Buttons --- */
        #widget-menu-panel {
            position: fixed; bottom: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            border-radius: 50px; padding: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1050; display: flex; align-items: center; gap: 8px; border: none !important;
        }
        body.dark-mode #widget-menu-panel { background: rgba(30, 30, 30, 0.85); border: none !important; }

        /* Modernized Timer Buttons */
        .timer-btn-hollow { 
            background-color: transparent; border: 1px solid #31b0d5; color: #31b0d5; 
            padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s;
        }
        .timer-btn-hollow:hover { background-color: rgba(49, 176, 213, 0.15); transform: translateY(-1px); }
        body.dark-mode .timer-btn-hollow { border-color: #90caf9; color: #90caf9; }

        /* Weather Contrast Fix */
        #weather-container-mini { width: 180px; height: 50px; overflow: hidden; display: flex; align-items: center; }
        body.dark-mode #weather-container-mini iframe { filter: invert(1) hue-rotate(180deg); }

        /* --- Floating Footer --- */
        .footer { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); text-align: center; width: 100%; z-index: 10; pointer-events: none; }
        .footer p { margin: 0 0 5px 0; font-weight: bold; color: #555; text-shadow: 0 0 8px rgba(255,255,255,0.9);}
        .footer-logo { max-width: 160px; height: auto; display: inline-block; opacity: 0.7; }

        /* Grid for normal mode */
        .schedule-grid { display: grid; grid-template-columns: minmax(130px, auto) 1fr minmax(220px, auto); gap: 15px; align-items: center; padding: 8px 10px; transition: all 0.6s cubic-bezier(0.25, 1.2, 0.3, 1); }
        .period-name { font-weight: bold; font-size: 1.6rem; white-space: nowrap; }
        .period-time { text-align: right; font-size: 1.4rem; color: #555; white-space: nowrap; }

        /* Minimal/Focus Mode Logic */
        .docked-schedule { display: flex; gap: 20px; align-items: center; justify-content: center; opacity: 0; transform: translateY(-20px); transition: all 0.6s cubic-bezier(0.25, 1.2, 0.3, 1); visibility: hidden; position: absolute; width: 100%; }
        body.minimal-active .docked-schedule { opacity: 1; transform: translateY(0); visibility: visible; }
        body.minimal-active .schedule-container { max-height: 0 !important; opacity: 0 !important; padding: 0 !important; margin: 0 !important; overflow: hidden; }
        .docked-name { font-size: 1.8rem; font-weight: 800; color: #003366; }
        body.dark-mode .docked-name { color: #90caf9; }

        /* Widget Cards */
        .widget-card { position: fixed; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.4); border-radius: 15px; padding: 15px; display: none; flex-direction: column; overflow: hidden; resize: both; z-index: 1000; }
        body.dark-mode .widget-card { background: rgba(30, 30, 30, 0.4); border-color: rgba(255,255,255,0.1); }
        body.minimal-active .widget-card.active-widget { display: flex; }
    </style>
</head>
<body>

    <div id="vibe-bg"><div id="yt-player-container"></div></div>

    <div id="floating-header" class="floating-header">
        <div class="header-left">
            <button id="hamburgerBtn" class="header-icon-btn active-btn" onclick="toggleSidebar(true)">☰</button>
            <img src="https://drive.google.com/thumbnail?id=1XJEeGiblu9O3iGevy_j8RLR06LcyimqQ&sz=w400" alt="Logo" class="header-logo">
            <div id="weather-container-mini" class="mini-widgets-dock"></div>
        </div>
        <div class="header-center">
            <div id="docked-schedule" class="docked-schedule">
                <div id="docked-name" class="docked-name">Focus Mode</div>
                <div id="docked-badge" class="open-badge" style="display:none;">OPEN</div>
                <div id="docked-time" class="docked-time" style="font-size:1.6rem; font-weight:bold;">--:--</div>
                <span id="docked-warning" class="dead-time-warning">DEAD TIME</span>
            </div>
        </div>
        <div class="header-right">
            <button id="minimalViewBtn" class="header-icon-btn" onclick="toggleMinimalView(true)">⛶</button>
            <button id="waffleViewBtn" class="header-icon-btn" onclick="toggleWaffleMenu(true)">⣿</button>
            <div id="clock">00:00:00 AM</div>
        </div>
    </div>

    <div id="qotd-sub-bar" class="qotd-sub-bar">
        <span id="sub-qotd-question" class="sub-qotd-text">Loading question...</span>
        <img id="sub-qotd-qr" class="sub-qotd-qr" src="" alt="QR">
    </div>

    <div id="widget-menu-panel">
        <button class="float-btn" onclick="toggleWidgetPanel()">+</button>
        <div id="widget-panel-icons" style="display:none; flex-direction: row; gap: 8px;">
            <button id="wm-btn-weather" class="header-icon-btn" onclick="toggleWidget('weather', !activeWidgets.weather)">⛅</button>
            <button id="wm-btn-qotd" class="header-icon-btn" onclick="toggleWidget('qotd', !activeWidgets.qotd)">❓</button>
            <button id="wm-btn-timer" class="header-icon-btn" onclick="toggleWidget('timer', !activeWidgets.timer)">⏱️</button>
        </div>
    </div>

    <div class="dashboard-wrapper">
        <div class="sidebar" id="sidebar">
            <div class="control-group">
                <div class="switch-container"><span class="sub-label">Dark Mode</span>
                    <label class="switch"><input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()"><span class="slider"></span></label>
                </div>
            </div>
            <div class="control-group">
                <div class="accordion-header" onclick="toggleAccordion('sec-audio')"><label class="title">1. Audio & Voice</label><span class="chevron" id="chev-sec-audio">▼</span></div>
                <div class="accordion-content" id="sec-audio">
                    <select id="voicePreference" onchange="changeVoicePref()"></select>
                    <input type="range" id="volumeControl" min="0" max="1" step="0.05" oninput="syncGlobalVolume(this.value)">
                </div>
            </div>
            <div class="control-group">
                <div class="accordion-header" onclick="toggleAccordion('sec-schedule')"><label class="title">4. Schedule</label><span class="chevron" id="chev-sec-schedule">▼</span></div>
                <div class="accordion-content" id="sec-schedule">
                    <div id="autoIndicator" style="font-weight:bold; margin-bottom:10px;">Sync Status: ...</div>
                    <button class="timer-btn-hollow" onclick="fetchDailySchedule()" style="width:100%; margin-bottom:10px;">Force Sync Schedule</button>
                    <select id="scheduleMode" onchange="changeMode()">
                        <option value="synced">Google Sheet Sync</option>
                        <option value="web">WEB Schedule</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="schedule-container waffle-closed" id="schedule-container">
                <div class="schedule-title-row"><h3>Active Schedule</h3></div>
                <ul id="schedule-list"></ul>
            </div>
        </div>
    </div>

    <div class="widget-card" id="widget-weather" style="top:100px; left:400px; width:350px; height:400px;">
        <div class="widget-header-row"><h4 class="widget-title">Forecast</h4><button class="widget-close" onclick="toggleWidget('weather', false)">✖</button></div>
        <div id="weather-container-main"></div>
    </div>

    <div class="widget-card" id="widget-timer" style="top:520px; left:400px; width:300px; height:260px;">
        <div class="widget-header-row"><h4 class="widget-title">Timer</h4><button class="widget-close" onclick="toggleWidget('timer', false)">✖</button></div>
        <div class="timer-display" id="timer-display">05:00</div>
        <div class="timer-quick-add"><button class="timer-btn-hollow" onclick="addTimerMinutes(1)">+1m</button><button class="timer-btn-hollow" onclick="addTimerMinutes(5)">+5m</button></div>
        <div style="text-align:center; margin-top:15px;"><button class="btn inline" id="timer-start-btn" onclick="togglePlayTimer()">Start</button></div>
    </div>

    <div class="footer"><p>Walton Engineering</p><img src="https://drive.google.com/thumbnail?id=1C_7ujbANbJaMShbWDxuXx0m4ZTJLtkSE&sz=w800" class="footer-logo"></div>

    <audio id="regularBellAudio" src="bell.mp3" preload="auto"></audio>

    <script>
        const CALENDAR_URL = "https://script.google.com/macros/s/AKfycbzM6uF01goN2oNrWAIKal_FB-m-AuPUiBSnQbohr5XLR_AaKt5bTY8hQZN9RmYIrq-6/exec";
        const QOTD_URL = "https://script.google.com/macros/s/AKfycbxTHBPh45e_R7clf_hx3j3OLJP1ThFEBlDIu4OLyt4tTEDZg6_xImwzO08bE0JzG_ezlQ/exec";

        let activeSchedule = [], currentMode = 'synced', isMinimalView = false, activeWidgets = { weather:false, timer:false, qotd:false };
        let timerTotalSeconds = 300, timerIsPlaying = false, globalVolume = 1.0;

        // FIXED: Robust Schedule Fetcher
        async function fetchDailySchedule() {
            const ind = document.getElementById('autoIndicator');
            if(ind) ind.innerText = "Sync Status: Fetching...";
            
            try {
                // Cache-busting URL to prevent Google Script freezing
                const response = await fetch(`${CALENDAR_URL}?cb=${Date.now()}`, { method: 'GET' });
                const data = await response.json();
                
                if (data && data.schedule) {
                    predefinedSchedules['synced'] = data.schedule;
                    if(ind) ind.innerText = "Sync Status: ✓ Connected";
                    changeMode();
                }
            } catch (err) {
                console.error("Schedule sync failed:", err);
                if(ind) ind.innerText = "Sync Status: ⚠ Offline (Using Fallback)";
                currentMode = 'web';
                changeMode();
            }
        }

        function changeMode() {
            let base = predefinedSchedules[currentMode] || predefinedSchedules['web'];
            activeSchedule = [...base];
            renderSchedule();
        }

        function renderSchedule() {
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';
            activeSchedule.forEach(p => {
                const li = document.createElement('li');
                li.className = 'schedule-grid';
                li.dataset.start = p.start; li.dataset.end = p.end;
                li.innerHTML = `<div class="period-name">${p.name}</div><div class="middle-section"></div><div class="period-time">${p.start} - ${p.end}</div>`;
                list.appendChild(li);
            });
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            const currentMins = now.getHours() * 60 + now.getMinutes();

            // Minimal Mode Docking logic
            let currentClass = null;
            activeSchedule.forEach(p => {
                const [sh, sm] = p.start.split(':').map(Number);
                const [eh, em] = p.end.split(':').map(Number);
                if (currentMins >= (sh*60+sm) && currentMins < (eh*60+em)) currentClass = p;
            });

            if (currentClass) {
                document.getElementById('docked-name').innerText = currentClass.name;
                document.getElementById('docked-time').innerText = `${currentClass.start} - ${currentClass.end}`;
            }
        }

        function toggleMinimalView(force) {
            isMinimalView = !isMinimalView;
            document.body.classList.toggle('minimal-active', isMinimalView);
            updateQotdVisibility();
        }

        function toggleWidget(id, state) {
            activeWidgets[id] = state;
            const card = document.getElementById(`widget-${id}`);
            if(card) card.style.display = (state && isMinimalView) ? 'flex' : 'none';
            if(id === 'weather' && state) reloadWeatherWidget();
            updateQotdVisibility();
        }

        function toggleWidgetPanel() {
            const p = document.getElementById('widget-panel-icons');
            p.style.display = p.style.display === 'none' ? 'flex' : 'none';
        }

        function updateQotdVisibility() {
            const sub = document.getElementById('qotd-sub-bar');
            if (activeWidgets.qotd && !isMinimalView) sub.classList.add('visible');
            else sub.classList.remove('visible');
        }

        function toggleAccordion(id) {
            const content = document.getElementById(id);
            content.style.maxHeight = content.style.maxHeight ? null : "300px";
        }

        function toggleDarkMode() {
            isDarkMode = document.getElementById('darkModeToggle').checked;
            document.body.classList.toggle('dark-mode', isDarkMode);
            if(activeWidgets.weather) reloadWeatherWidget();
        }

        // Timer Logic
        function updateTimerDisplay() {
            const m = Math.floor(timerTotalSeconds / 60).toString().padStart(2, '0');
            const s = (timerTotalSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }
        function addTimerMinutes(n) { timerTotalSeconds += n*60; updateTimerDisplay(); }
        function togglePlayTimer() {
            if (timerIsPlaying) { clearInterval(timerInterval); timerIsPlaying = false; }
            else { 
                timerIsPlaying = true;
                timerInterval = setInterval(() => {
                    if (timerTotalSeconds > 0) { timerTotalSeconds--; updateTimerDisplay(); }
                    else { clearInterval(timerInterval); playBellWithQueue(2); }
                }, 1000);
            }
        }

        setInterval(updateClock, 1000);
        setTimeout(fetchDailySchedule, 500);
        initDraggableWidgets();
    </script>
</body>
</html>
